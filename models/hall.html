<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>3D-модель / Зал Народов</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link rel="stylesheet" href="../assets/css/model-frame.css" />
</head>
<body class="model-page">
  <main class="model-shell">
    <model-viewer
      id="viewer"
      src="../assets/models/hall/hall.glb?v=20260511-q98"
      alt="3D-модель Зала Народов"
      camera-controls
      touch-action="pan-y"
      camera-orbit="45deg 68deg 560m"
      camera-target="0m 125m 0m"
      min-camera-orbit="auto auto 45m"
      max-camera-orbit="auto auto 900m"
      field-of-view="30deg"
      min-field-of-view="12deg"
      max-field-of-view="55deg"
      exposure="1"
      shadow-intensity="0.25"
      environment-image="neutral"
      interaction-prompt="none"
      reveal="auto"
      loading="eager"
    >
      <div class="model-error" slot="poster">
        <strong>Загрузка модели…</strong>
      </div>
    </model-viewer>

    <div id="panLayer" class="pan-layer" aria-hidden="true"></div>

    <div class="model-badges" aria-hidden="true">
      <span>3D-модель / Зал Народов</span>
    </div>

    <section class="model-controls" aria-label="Управление 3D-моделью">
      <div class="control-row main-actions">
        <button type="button" id="openSeparate">Открыть отдельно</button>
        <button type="button" id="fullscreenBtn">Во весь экран</button>
        <button type="button" id="panToggle">Сдвиг камеры</button>
      </div>

      <div class="control-row pan-actions" id="panActions">
        <button type="button" data-pan="left">←</button>
        <button type="button" data-pan="right">→</button>
        <button type="button" data-pan="up">↑</button>
        <button type="button" data-pan="down">↓</button>
        <button type="button" data-target="center">Центр</button>
        <button type="button" data-target="top">К верхушке</button>
      </div>
    </section>
  </main>

  <script>
    const viewer = document.getElementById('viewer');
    const shell = document.querySelector('.model-shell');
    const panLayer = document.getElementById('panLayer');
    const panToggle = document.getElementById('panToggle');
    const panActions = document.getElementById('panActions');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const openSeparate = document.getElementById('openSeparate');

    const target = { x: 0, y: 125, z: 0 };
    let panMode = false;
    let dragging = false;
    let lastX = 0;
    let lastY = 0;

    function setTarget(x, y, z) {
      target.x = Math.max(-180, Math.min(180, x));
      target.y = Math.max(0, Math.min(260, y));
      target.z = Math.max(-220, Math.min(220, z));
      viewer.cameraTarget = `${target.x}m ${target.y}m ${target.z}m`;
    }

    function shiftTarget(dx, dy, dz = 0) {
      setTarget(target.x + dx, target.y + dy, target.z + dz);
    }

    function setPanMode(enabled) {
      panMode = enabled;
      shell.classList.toggle('is-pan-mode', panMode);
      panToggle.textContent = panMode ? 'Вращение' : 'Сдвиг камеры';
      panActions.classList.toggle('is-visible', panMode);
      if (panMode) {
        viewer.removeAttribute('camera-controls');
      } else {
        viewer.setAttribute('camera-controls', '');
      }
    }

    panToggle.addEventListener('click', () => setPanMode(!panMode));

    document.querySelectorAll('[data-pan]').forEach((button) => {
      button.addEventListener('click', () => {
        const direction = button.dataset.pan;
        const step = 18;
        if (direction === 'left') shiftTarget(-step, 0);
        if (direction === 'right') shiftTarget(step, 0);
        if (direction === 'up') shiftTarget(0, step);
        if (direction === 'down') shiftTarget(0, -step);
      });
    });

    document.querySelectorAll('[data-target]').forEach((button) => {
      button.addEventListener('click', () => {
        if (button.dataset.target === 'center') setTarget(0, 125, 0);
        if (button.dataset.target === 'top') setTarget(0, 235, 0);
      });
    });

    panLayer.addEventListener('pointerdown', (event) => {
      if (!panMode) return;
      dragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
      panLayer.setPointerCapture(event.pointerId);
    });

    panLayer.addEventListener('pointermove', (event) => {
      if (!panMode || !dragging) return;
      const dx = event.clientX - lastX;
      const dy = event.clientY - lastY;
      lastX = event.clientX;
      lastY = event.clientY;
      shiftTarget(-dx * 0.32, dy * 0.32);
    });

    panLayer.addEventListener('pointerup', () => { dragging = false; });
    panLayer.addEventListener('pointercancel', () => { dragging = false; });

    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await shell.requestFullscreen();
        }
      } catch (_) {
        shell.classList.toggle('pseudo-fullscreen');
      }
    });

    openSeparate.addEventListener('click', () => {
      window.open(window.location.href.split('#')[0], '_blank', 'noopener,noreferrer');
    });

    viewer.addEventListener('error', () => {
      const error = document.createElement('div');
      error.className = 'model-error model-error-overlay';
      error.innerHTML = '<strong>Модель не загрузилась</strong><br>Проверьте, что файл assets/models/hall/hall.glb загружен в репозиторий и не блокируется браузером.';
      shell.appendChild(error);
    });
  </script>
</body>
</html>
