<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>3D-модель / Зал Народов</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #060908;
      --line: rgba(255,255,255,.16);
      --text: rgba(255,255,255,.88);
      --muted: rgba(255,255,255,.58);
      --glass: rgba(5,8,8,.72);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      background: radial-gradient(circle at 50% 35%, rgba(179, 125, 77, .18), transparent 38%), var(--bg);
      color: var(--text);
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .viewer-shell {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      padding: clamp(10px, 2vw, 18px);
      gap: 10px;
      touch-action: none;
      overscroll-behavior: contain;
    }

    .viewer-card {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(0,0,0,.28);
      box-shadow: 0 24px 90px rgba(0,0,0,.32);
    }

    model-viewer {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 420px;
      --poster-color: transparent;
      background-color: transparent;
      touch-action: none;
    }

    .label {
      position: absolute;
      left: 14px;
      bottom: 14px;
      max-width: calc(100% - 28px);
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      color: var(--muted);
      font-size: 13px;
      line-height: 1;
      letter-spacing: .16em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .control-link,
    .control-button {
      appearance: none;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      background: rgba(0,0,0,.54);
      color: var(--text);
      padding: 10px 14px;
      font: inherit;
      font-size: 14px;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .control-link:hover,
    .control-button:hover {
      border-color: rgba(255,255,255,.34);
    }

    .progress {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 58px;
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      opacity: 0;
      transition: opacity .18s ease;
    }

    .progress.visible { opacity: 1; }

    .bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: rgba(255,255,255,.68);
    }

    @media (max-width: 720px) {
      html,
      body { overflow: hidden; }

      .viewer-shell {
        padding: 8px;
        gap: 8px;
      }

      .viewer-card {
        border-radius: 18px;
      }

      model-viewer {
        min-height: 72svh;
      }

      .label {
        left: 10px;
        bottom: 10px;
        padding: 8px 10px;
        font-size: 11px;
        letter-spacing: .12em;
      }

      .controls {
        justify-content: stretch;
      }

      .control-link,
      .control-button {
        flex: 1 1 auto;
        min-width: 0;
        padding: 11px 12px;
        font-size: 13px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="viewer-shell" aria-label="Просмотр 3D-модели Зала Народов">
    <section class="viewer-card">
      <model-viewer
        id="viewer"
        src="../assets/models/hall/hall.glb?v=20260511-hall-local-optimized"
        alt="3D-модель Зала Народов"
        camera-controls
        auto-rotate
        rotation-per-second="18deg"
        interaction-prompt="none"
        shadow-intensity="0.7"
        exposure="1"
        camera-orbit="45deg 68deg auto"
        min-camera-orbit="auto auto 8m"
        max-camera-orbit="auto auto 240m"
        field-of-view="35deg">
      </model-viewer>
      <div class="label">3D-модель / Зал Народов</div>
      <div class="progress" id="progress"><div class="bar" id="bar"></div></div>
    </section>

    <nav class="controls" aria-label="Действия с моделью">
      <a class="control-link" href="hall.html" target="_blank" rel="noopener">Открыть 3D отдельно</a>
      <button class="control-button" id="fullscreen" type="button">Во весь экран</button>
      <a class="control-link" href="../hall.html" target="_top">К странице объекта</a>
    </nav>
  </main>

  <script>
    const viewer = document.getElementById('viewer');
    const progress = document.getElementById('progress');
    const bar = document.getElementById('bar');
    const fullscreen = document.getElementById('fullscreen');

    viewer.addEventListener('progress', (event) => {
      const value = Math.round((event.detail.totalProgress || 0) * 100);
      bar.style.width = `${value}%`;
      progress.classList.toggle('visible', value > 0 && value < 100);
    });

    viewer.addEventListener('load', () => {
      progress.classList.remove('visible');
    });

    fullscreen.addEventListener('click', async () => {
      const target = document.documentElement;
      try {
        if (!document.fullscreenElement && target.requestFullscreen) {
          await target.requestFullscreen();
        } else if (document.exitFullscreen) {
          await document.exitFullscreen();
        }
      } catch (error) {
        window.open(window.location.href, '_blank', 'noopener');
      }
    });
  </script>
</body>
</html>
