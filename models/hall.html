<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>3D-модель / Зал Народов</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050706;
      --panel: rgba(5, 7, 6, 0.72);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f2eee8;
      --muted: rgba(242, 238, 232, 0.72);
      --accent: #d6b15d;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: radial-gradient(circle at 50% 25%, rgba(214, 177, 93, 0.16), transparent 34%), var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      min-height: 100svh;
    }

    .viewer-shell {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 420px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.01));
      touch-action: none;
      overscroll-behavior: contain;
    }

    model-viewer {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 420px;
      --poster-color: transparent;
      background: transparent;
      touch-action: none;
    }

    .viewer-top {
      position: absolute;
      z-index: 5;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .label {
      pointer-events: none;
      max-width: min(560px, 70vw);
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
      letter-spacing: .16em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      pointer-events: auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.62);
      color: var(--text);
      text-decoration: none;
      font: inherit;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .btn:hover { border-color: rgba(214, 177, 93, 0.65); }

    .progress {
      position: absolute;
      z-index: 6;
      left: 16px;
      bottom: 16px;
      max-width: calc(100% - 32px);
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .14em;
      text-transform: uppercase;
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .2s ease, transform .2s ease;
    }

    .progress.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .error {
      position: absolute;
      z-index: 7;
      inset: 50% auto auto 50%;
      width: min(520px, calc(100% - 32px));
      transform: translate(-50%, -50%);
      padding: 18px;
      border: 1px solid rgba(255, 120, 120, 0.38);
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.74);
      color: var(--text);
      text-align: center;
      display: none;
      backdrop-filter: blur(16px);
    }

    .error.is-visible { display: block; }
    .error strong { display: block; margin-bottom: 8px; }
    .error span { color: var(--muted); }

    @media (max-width: 720px) {
      .viewer-shell,
      model-viewer {
        min-height: 78svh;
      }

      .viewer-top {
        top: auto;
        bottom: 14px;
        left: 12px;
        right: 12px;
        align-items: flex-end;
      }

      .label {
        max-width: 48vw;
        padding: 8px 10px;
        font-size: 10px;
        letter-spacing: .12em;
      }

      .actions {
        gap: 6px;
      }

      .btn {
        min-height: 34px;
        padding: 7px 10px;
        font-size: 12px;
      }

      .btn.secondary {
        display: none;
      }

      .progress {
        left: 12px;
        bottom: 62px;
        font-size: 11px;
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <main class="viewer-shell" id="viewerShell">
    <model-viewer
      id="viewer"
      src="../assets/models/hall/hall.glb?v=20260511-full-compressed"
      alt="3D-модель Зала Народов"
      camera-controls
      auto-rotate
      rotation-per-second="12deg"
      interaction-prompt="none"
      shadow-intensity="0.65"
      exposure="1"
      environment-image="neutral"
      camera-orbit="35deg 68deg auto"
      min-camera-orbit="auto auto 5m"
      max-camera-orbit="auto auto 900m"
      field-of-view="35deg"
      ar>
    </model-viewer>

    <div class="viewer-top">
      <div class="label">3D-модель / Зал Народов</div>
      <nav class="actions" aria-label="Действия с моделью">
        <a class="btn secondary" href="../hall.html" target="_top">К странице объекта</a>
        <a class="btn" href="./hall.html" target="_blank" rel="noopener">Открыть отдельно</a>
        <button class="btn" type="button" id="fullscreenBtn">Во весь экран</button>
      </nav>
    </div>

    <div class="progress is-visible" id="progress">Подготовка модели…</div>
    <div class="error" id="errorBox">
      <strong>Модель не загрузилась</strong>
      <span>Проверьте, что файл assets/models/hall/hall.glb загружен в репозиторий и не блокируется браузером.</span>
    </div>
  </main>

  <script>
    const viewer = document.getElementById('viewer');
    const shell = document.getElementById('viewerShell');
    const progress = document.getElementById('progress');
    const errorBox = document.getElementById('errorBox');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    viewer.addEventListener('progress', (event) => {
      const value = Math.round((event.detail.totalProgress || 0) * 100);
      progress.textContent = value < 100 ? `Загрузка модели… ${value}%` : 'Модель готова';
      progress.classList.add('is-visible');
    });

    viewer.addEventListener('load', () => {
      progress.textContent = 'Модель готова';
      window.setTimeout(() => progress.classList.remove('is-visible'), 1000);
    });

    viewer.addEventListener('error', () => {
      progress.classList.remove('is-visible');
      errorBox.classList.add('is-visible');
    });

    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement && shell.requestFullscreen) {
          await shell.requestFullscreen();
        } else if (document.fullscreenElement && document.exitFullscreen) {
          await document.exitFullscreen();
        }
      } catch (error) {
        window.open('./hall.html', '_blank', 'noopener');
      }
    });
  </script>
</body>
</html>
