<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>3D-модель / Зал Народов</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050706;
      --panel: rgba(5, 7, 6, 0.72);
      --line: rgba(255, 255, 255, 0.14);
      --text: #f2eee8;
      --muted: rgba(242, 238, 232, 0.72);
      --accent: #d6b15d;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: radial-gradient(circle at 50% 24%, rgba(214, 177, 93, 0.16), transparent 36%), var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body { min-height: 100svh; }

    .viewer-shell {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 520px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.01));
      touch-action: none;
      overscroll-behavior: contain;
    }

    model-viewer {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 520px;
      --poster-color: transparent;
      background: transparent;
      touch-action: none;
    }

    .viewer-top {
      position: absolute;
      z-index: 5;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .label,
    .progress {
      pointer-events: none;
      max-width: min(520px, 46vw);
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
      letter-spacing: .16em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .progress {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .2s ease, transform .2s ease;
    }

    .progress.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .actions {
      pointer-events: auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.62);
      color: var(--text);
      text-decoration: none;
      font: inherit;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .btn:hover { border-color: rgba(214, 177, 93, 0.65); }

    .camera-pan-controls {
      position: absolute;
      z-index: 6;
      top: max(14px, env(safe-area-inset-top));
      right: max(14px, env(safe-area-inset-right));
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      pointer-events: none;
    }

    .camera-pan-toggle,
    .camera-pan-panel .btn {
      pointer-events: auto;
    }

    .camera-pan-panel {
      pointer-events: auto;
      display: grid;
      grid-template-columns: repeat(3, minmax(38px, auto));
      gap: 6px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.56);
      backdrop-filter: blur(14px);
    }

    .camera-pan-panel .btn {
      min-width: 38px;
      min-height: 34px;
      padding: 7px 9px;
    }

    .camera-pan-panel .wide { grid-column: 1 / -1; }

    .viewer-shell.is-pan-mode model-viewer {
      cursor: grab;
      touch-action: none;
    }

    .viewer-shell.is-pan-mode model-viewer:active { cursor: grabbing; }

    .error {
      position: absolute;
      z-index: 7;
      inset: 50% auto auto 50%;
      width: min(580px, calc(100% - 32px));
      transform: translate(-50%, -50%);
      padding: 18px;
      border: 1px solid rgba(255, 120, 120, 0.38);
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.78);
      color: var(--text);
      text-align: center;
      display: none;
      backdrop-filter: blur(16px);
    }

    .error.is-visible { display: block; }
    .error strong { display: block; margin-bottom: 8px; }
    .error span { color: var(--muted); }

    @media (max-width: 720px) {
      .viewer-shell,
      model-viewer {
        min-height: 78svh;
      }

      .viewer-top {
        left: 10px;
        right: 10px;
        bottom: 10px;
        gap: 8px;
      }

      .label,
      .progress {
        max-width: 42vw;
        padding: 8px 10px;
        font-size: 10px;
        letter-spacing: .12em;
      }

      .actions { gap: 6px; }

      .btn {
        min-height: 34px;
        padding: 7px 10px;
        font-size: 12px;
      }

      .btn.secondary { display: none; }

      .camera-pan-controls {
        top: max(8px, env(safe-area-inset-top));
        right: max(8px, env(safe-area-inset-right));
        max-width: calc(100% - 16px);
      }

      .camera-pan-panel {
        grid-template-columns: repeat(3, minmax(34px, auto));
        gap: 5px;
        padding: 6px;
        border-radius: 16px;
      }

      .camera-pan-panel .btn {
        min-width: 34px;
        min-height: 31px;
        padding: 6px 8px;
        font-size: 10.5px;
      }
    }
  </style>
</head>
<body>
  <main class="viewer-shell" id="viewerShell">
    <model-viewer
      id="viewer"
      src="../assets/models/hall/hall.glb?v=20260511-pan"
      alt="3D-модель Зала Народов"
      camera-controls
      auto-rotate
      rotation-per-second="10deg"
      interaction-prompt="none"
      shadow-intensity="0.6"
      exposure="1"
      environment-image="neutral"
      camera-orbit="35deg 68deg auto"
      min-camera-orbit="auto auto 5m"
      max-camera-orbit="auto auto 900m"
      field-of-view="35deg"
      ar>
    </model-viewer>

    <div class="camera-pan-controls" aria-label="Сдвиг камеры">
      <button class="btn camera-pan-toggle" id="panModeToggle" type="button" aria-pressed="false">Сдвиг камеры</button>
      <div class="camera-pan-panel" id="panPanel" hidden>
        <button class="btn" type="button" data-pan="up">↑</button>
        <button class="btn" type="button" data-pan="left">←</button>
        <button class="btn" type="button" data-pan="center">Центр</button>
        <button class="btn" type="button" data-pan="right">→</button>
        <button class="btn" type="button" data-pan="down">↓</button>
        <button class="btn wide" type="button" data-pan="top">К верхушке</button>
      </div>
    </div>

    <div class="viewer-top">
      <div class="status-stack">
        <div class="label">3D-модель / Зал Народов</div>
        <div class="progress is-visible" id="progress">Подготовка модели…</div>
      </div>
      <nav class="actions" aria-label="Действия с моделью">
        <a class="btn secondary" href="../hall.html" target="_top">К странице объекта</a>
        <a class="btn" href="./hall.html" target="_blank" rel="noopener">Открыть отдельно</a>
        <button class="btn" type="button" id="fullscreenBtn">Во весь экран</button>
      </nav>
    </div>

    <div class="error" id="errorBox">
      <strong>Модель не загрузилась</strong>
      <span id="errorText">Проверьте, что файл assets/models/hall/hall.glb загружен в репозиторий и открывается напрямую.</span>
    </div>
  </main>

  <script>
    const viewer = document.getElementById('viewer');
    const shell = document.getElementById('viewerShell');
    const progress = document.getElementById('progress');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const panModeToggle = document.getElementById('panModeToggle');
    const panPanel = document.getElementById('panPanel');

    const cameraState = {
      target: { x: 0, y: 0, z: 0 },
      dimensions: { x: 1, y: 1, z: 1 },
      panMode: false,
      pointer: null
    };

    function setCameraTarget(x, y, z) {
      cameraState.target = { x, y, z };
      viewer.cameraTarget = `${x}m ${y}m ${z}m`;
    }

    function getStep() {
      const d = cameraState.dimensions;
      return Math.max(d.x || 1, d.y || 1, d.z || 1) * 0.08;
    }

    function applyPan(action) {
      const t = cameraState.target;
      const step = getStep();
      const d = cameraState.dimensions;

      if (action === 'left') setCameraTarget(t.x - step, t.y, t.z);
      if (action === 'right') setCameraTarget(t.x + step, t.y, t.z);
      if (action === 'up') setCameraTarget(t.x, t.y + step, t.z);
      if (action === 'down') setCameraTarget(t.x, t.y - step, t.z);
      if (action === 'center') setCameraTarget(0, 0, 0);
      if (action === 'top') setCameraTarget(0, Math.max(d.y * 0.38, step), 0);
    }

    function setPanMode(enabled) {
      cameraState.panMode = enabled;
      shell.classList.toggle('is-pan-mode', enabled);
      panPanel.hidden = !enabled;
      panModeToggle.setAttribute('aria-pressed', String(enabled));
      panModeToggle.textContent = enabled ? 'Вращение' : 'Сдвиг камеры';
      if (enabled) {
        viewer.removeAttribute('camera-controls');
        viewer.removeAttribute('auto-rotate');
        progress.textContent = 'Сдвиг: перетащите модель, затем приблизьте';
        progress.classList.add('is-visible');
      } else {
        viewer.setAttribute('camera-controls', '');
        viewer.setAttribute('auto-rotate', '');
        cameraState.pointer = null;
        progress.textContent = 'Вращение и масштаб';
        progress.classList.add('is-visible');
        window.setTimeout(() => progress.classList.remove('is-visible'), 1200);
      }
    }

    viewer.addEventListener('progress', (event) => {
      const value = Math.round((event.detail.totalProgress || 0) * 100);
      progress.textContent = value < 100 ? `Загрузка модели… ${value}%` : 'Модель готова';
      progress.classList.add('is-visible');
    });

    viewer.addEventListener('load', () => {
      const dimensions = viewer.getDimensions ? viewer.getDimensions() : null;
      if (dimensions) cameraState.dimensions = dimensions;
      setCameraTarget(0, 0, 0);
      progress.textContent = 'Модель готова';
      window.setTimeout(() => progress.classList.remove('is-visible'), 1200);
    });

    viewer.addEventListener('error', (event) => {
      progress.classList.remove('is-visible');
      const message = event?.detail?.sourceError?.message || event?.detail?.message || '';
      if (message) errorText.textContent = `Ошибка загрузки: ${message}`;
      errorBox.classList.add('is-visible');
    });

    panModeToggle.addEventListener('click', () => setPanMode(!cameraState.panMode));

    panPanel.addEventListener('click', (event) => {
      const button = event.target.closest('[data-pan]');
      if (!button) return;
      applyPan(button.dataset.pan);
    });

    viewer.addEventListener('pointerdown', (event) => {
      if (!cameraState.panMode) return;
      cameraState.pointer = { x: event.clientX, y: event.clientY };
      viewer.setPointerCapture?.(event.pointerId);
      event.preventDefault();
    });

    viewer.addEventListener('pointermove', (event) => {
      if (!cameraState.panMode || !cameraState.pointer) return;
      const dx = event.clientX - cameraState.pointer.x;
      const dy = event.clientY - cameraState.pointer.y;
      cameraState.pointer = { x: event.clientX, y: event.clientY };
      const rect = viewer.getBoundingClientRect();
      const scale = Math.max(cameraState.dimensions.x, cameraState.dimensions.y, cameraState.dimensions.z, 1) / Math.max(rect.width, rect.height, 1);
      const t = cameraState.target;
      setCameraTarget(t.x - dx * scale, t.y + dy * scale, t.z);
      event.preventDefault();
    });

    viewer.addEventListener('pointerup', () => { cameraState.pointer = null; });
    viewer.addEventListener('pointercancel', () => { cameraState.pointer = null; });

    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement && shell.requestFullscreen) {
          await shell.requestFullscreen();
        } else if (document.fullscreenElement && document.exitFullscreen) {
          await document.exitFullscreen();
        }
      } catch (error) {
        window.open('./hall.html', '_blank', 'noopener');
      }
    });
  </script>
</body>
</html>
