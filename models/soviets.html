<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Дворец Советов — 3D-реконструкция</title>
  <link rel="stylesheet" href="../assets/css/model-frame.css" />
  <style>
    .model-action--back { display: none; }
    body.is-standalone .model-action--standalone { display: none; }
    body.is-standalone .model-action--back { display: inline-flex; }
  </style>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <main class="model-frame-page model-shell" id="viewerShell" aria-label="Объект 03 / Дворец Советов">
    <div class="model-loader" id="modelLoader">загрузка модели…</div>
    <div class="model-error model-error-overlay" id="modelError" hidden>
      Не удалось загрузить 3D-модель. Откройте файл модели напрямую или обновите страницу.
    </div>

    <model-viewer
      id="modelViewer"
      class="model-viewer"
      src="../assets/models/soviets/palace-of-soviets.glb?v=20260512-navigation"
      alt="Интерактивная 3D-модель Дворца Советов"
      data-default-orbit="0deg 65deg 165%"
      data-default-fov="28deg"
      data-target-x="0"
      data-target-y="0"
      data-target-z="0"
      data-top-y=""
      camera-controls
      touch-action="pan-y"
      auto-rotate
      auto-rotate-delay="1200"
      rotation-per-second="18deg"
      shadow-intensity="0.9"
      shadow-softness="0.85"
      exposure="0.95"
      environment-image="neutral"
      camera-orbit="0deg 65deg 165%"
      camera-target="0m 0m 0m"
      min-camera-orbit="auto auto 65%"
      max-camera-orbit="auto auto 430%"
      field-of-view="28deg"
      min-field-of-view="12deg"
      max-field-of-view="55deg"
      interaction-prompt="auto"
      interaction-prompt-style="basic"
      bounds="tight"
      loading="eager"
      reveal="auto">
    </model-viewer>

    <div class="model-ui" aria-hidden="true">
      <div class="model-ui__label">3D-модель / Дворец Советов</div>
      <div class="model-ui__status" id="modelStatus">загрузка модели…</div>
    </div>

    <nav class="model-toolbar" aria-label="Управление 3D-моделью">
      <div class="model-actions">
        <a class="model-action model-action--standalone" href="soviets.html?standalone=1" target="_blank" rel="noopener">Открыть 3D отдельно</a>
        <a class="model-action model-action--back" href="../soviets.html" target="_top">К странице объекта</a>
        <button class="model-action" type="button" id="fullscreenButton">Во весь экран</button>
        <button class="model-action" type="button" id="panButton" aria-expanded="false" aria-controls="cameraPanPanel">Сдвиг камеры</button>
      </div>

      <div class="camera-pan-panel" id="cameraPanPanel" hidden>
        <button class="model-action" type="button" data-pan="left">←</button>
        <button class="model-action" type="button" data-pan="right">→</button>
        <button class="model-action" type="button" data-pan="up">↑</button>
        <button class="model-action" type="button" data-pan="down">↓</button>
        <button class="model-action" type="button" data-pan="center">Центр</button>
        <button class="model-action" type="button" data-pan="top">К верхушке</button>
      </div>
    </nav>
  </main>

  <script>
    (() => {
      const shell = document.getElementById('viewerShell');
      const viewer = document.getElementById('modelViewer');
      const loader = document.getElementById('modelLoader');
      const error = document.getElementById('modelError');
      const status = document.getElementById('modelStatus');
      const fullscreenButton = document.getElementById('fullscreenButton');
      const panButton = document.getElementById('panButton');
      const panPanel = document.getElementById('cameraPanPanel');
      const params = new URLSearchParams(window.location.search);

      const isTopLevel = (() => {
        try { return window.self === window.top; }
        catch (_error) { return false; }
      })();

      if (params.has('standalone') || isTopLevel) {
        document.body.classList.add('is-standalone');
      }

      const numericDataset = (name, fallback) => {
        const raw = viewer.dataset[name];
        if (raw === undefined || String(raw).trim() === '') return fallback;
        const value = Number(raw);
        return Number.isFinite(value) ? value : fallback;
      };

      const state = {
        center: {
          x: numericDataset('targetX', 0),
          y: numericDataset('targetY', 0),
          z: numericDataset('targetZ', 0),
        },
        dimensions: { x: 1, y: 1, z: 1 },
        target: {
          x: numericDataset('targetX', 0),
          y: numericDataset('targetY', 0),
          z: numericDataset('targetZ', 0),
        },
        topY: numericDataset('topY', NaN),
        ready: false,
      };

      const setStatus = (text) => {
        if (status) status.textContent = text;
      };

      const getVector = (value, fallback) => {
        if (!value) return { ...fallback };
        return {
          x: Number(value.x ?? fallback.x),
          y: Number(value.y ?? fallback.y),
          z: Number(value.z ?? fallback.z),
        };
      };

      const syncParentFrame = () => {
        try {
          const frame = window.frameElement;
          if (!frame) return;
          frame.style.display = 'block';
          frame.style.width = '100%';
          frame.style.height = '100%';
          frame.style.minWidth = '0';
          frame.style.minHeight = '0';
          frame.style.border = '0';
          frame.style.overflow = 'hidden';
          const host = frame.closest('.model-host, .sketchfab-wrap, .page-shell');
          if (host) {
            host.style.overflow = 'hidden';
            host.style.minWidth = '0';
          }
        } catch (_error) {}
      };

      const applyTarget = () => {
        viewer.cameraTarget = `${state.target.x}m ${state.target.y}m ${state.target.z}m`;
      };

      const resetCamera = () => {
        state.target = { ...state.center };
        applyTarget();
        viewer.cameraOrbit = viewer.dataset.defaultOrbit || viewer.getAttribute('camera-orbit') || '0deg 65deg auto';
        viewer.fieldOfView = viewer.dataset.defaultFov || viewer.getAttribute('field-of-view') || '30deg';
        setStatus('камера по центру');
      };

      const focusTop = () => {
        const height = Math.max(state.dimensions.y, 1);
        state.target = {
          x: state.center.x,
          y: Number.isFinite(state.topY) ? state.topY : state.center.y + height * 0.32,
          z: state.center.z,
        };
        applyTarget();
        setStatus('камера к верхушке');
      };

      const panCamera = (direction) => {
        if (!state.ready) return;
        const stepX = Math.max(state.dimensions.x, state.dimensions.z, 1) * 0.08;
        const stepY = Math.max(state.dimensions.y, 1) * 0.08;
        if (direction === 'left') state.target.x -= stepX;
        if (direction === 'right') state.target.x += stepX;
        if (direction === 'up') state.target.y += stepY;
        if (direction === 'down') state.target.y -= stepY;
        if (direction === 'center') return resetCamera();
        if (direction === 'top') return focusTop();
        applyTarget();
        setStatus('сдвиг камеры');
      };

      const enterPseudoFullscreen = () => {
        shell.classList.add('pseudo-fullscreen', 'is-pseudo-fullscreen');
        fullscreenButton.textContent = 'Выйти из экрана';
      };

      const exitPseudoFullscreen = () => {
        shell.classList.remove('pseudo-fullscreen', 'is-pseudo-fullscreen');
        fullscreenButton.textContent = 'Во весь экран';
      };

      fullscreenButton.addEventListener('click', async () => {
        try {
          if (document.fullscreenElement) {
            await document.exitFullscreen();
          } else if (shell.requestFullscreen) {
            await shell.requestFullscreen();
          } else if (shell.webkitRequestFullscreen) {
            shell.webkitRequestFullscreen();
          } else if (shell.classList.contains('is-pseudo-fullscreen')) {
            exitPseudoFullscreen();
          } else {
            enterPseudoFullscreen();
          }
        } catch (_error) {
          if (shell.classList.contains('is-pseudo-fullscreen')) exitPseudoFullscreen();
          else enterPseudoFullscreen();
        }
      });

      document.addEventListener('fullscreenchange', () => {
        const active = document.fullscreenElement === shell;
        shell.classList.toggle('is-pseudo-fullscreen', active);
        fullscreenButton.textContent = active ? 'Выйти из экрана' : 'Во весь экран';
      });

      panButton.addEventListener('click', () => {
        const isHidden = panPanel.hasAttribute('hidden');
        panPanel.toggleAttribute('hidden', !isHidden);
        panButton.classList.toggle('is-active', isHidden);
        panButton.setAttribute('aria-expanded', String(isHidden));
        shell.classList.toggle('is-pan-mode', isHidden);
        setStatus(isHidden ? 'режим сдвига камеры' : 'вращение · масштаб · обзор');
      });

      panPanel.addEventListener('click', (event) => {
        const button = event.target.closest('[data-pan]');
        if (!button) return;
        panCamera(button.dataset.pan);
      });

      syncParentFrame();
      window.addEventListener('resize', syncParentFrame);

      viewer.addEventListener('load', () => {
        loader.hidden = true;
        error.hidden = true;
        setStatus('вращение · масштаб · обзор');
        const detectedCenter = getVector(viewer.getBoundingBoxCenter?.(), state.center);
        const hasExplicitTarget = ['targetX', 'targetY', 'targetZ'].some((name) => viewer.dataset[name] !== undefined && viewer.dataset[name] !== '');
        if (!hasExplicitTarget) {
          state.center = detectedCenter;
          state.target = { ...detectedCenter };
        }
        state.dimensions = getVector(viewer.getDimensions?.(), state.dimensions);
        state.ready = true;
        applyTarget();
        syncParentFrame();
      });

      viewer.addEventListener('progress', (event) => {
        const progress = event.detail && Number.isFinite(event.detail.totalProgress)
          ? Math.round(event.detail.totalProgress * 100)
          : null;
        if (progress !== null && progress < 100) setStatus(`загрузка модели… ${progress}%`);
      });

      viewer.addEventListener('error', () => {
        loader.hidden = true;
        error.hidden = false;
        setStatus('ошибка загрузки');
      });
    })();
  </script>
</body>
</html>
