<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Дворец Советов — Нереализованная архитектура XX века</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/model-frame.css" />
  <style>
    .model-action--back { display: none; }
    body.is-standalone .model-action--standalone { display: none; }
    body.is-standalone .model-action--back { display: inline-flex; }


    /* Keep model viewer controls compact, but unify non-control labels with the site font. */
    .model-ui,
    .model-loader,
    .model-error {
      font-family: "Cormorant Garamond", Georgia, serif;
    }


    .model-ui__label,
    .model-ui__status,
    .model-loader,
    .model-error {
      font-size: clamp(1rem, 1.1vw, 1.16rem);
    }

  

    /* Round 7: readable minimum text size inside 3D frames. */
    html,
    body {
      font-size: 18px !important;
    }

    .model-ui__label,
    .model-ui__status,
    .model-loader,
    .model-error,
    .model-action {
      font-size: 18px !important;
      line-height: 1.25 !important;
    }

    .model-action {
      min-height: 42px !important;
      padding: 10px 18px !important;
    }


    /* Round 10: compact controls inside the 3D viewer window. */
    html,
    body {
      font-size: 15px !important;
    }

    .model-ui__label,
    .model-ui__status,
    .model-loader,
    .model-error {
      font-size: clamp(14px, .9vw, 16px) !important;
      line-height: 1.22 !important;
    }

    .model-action {
      font-size: clamp(12px, .78vw, 14px) !important;
      line-height: 1.15 !important;
      min-height: 32px !important;
      padding: 6px 12px !important;
      border-radius: 999px !important;
    }

    .model-actions,
    .camera-pan-panel {
      gap: 7px !important;
    }

    @media (max-width: 640px) {
      .model-action {
        font-size: 12px !important;
        min-height: 30px !important;
        padding: 5px 10px !important;
      }
    }

  

    /* Round 12: smaller controls inside the 3D viewer; the main site text is not affected. */
    html,
    body {
      font-size: 14px !important;
    }

    .model-ui {
      pointer-events: auto !important;
    }

    .model-ui__label,
    .model-ui__status,
    .model-loader,
    .model-error {
      font-size: clamp(12px, .78vw, 14px) !important;
      line-height: 1.18 !important;
    }

    .model-ui__label {
      cursor: pointer;
      user-select: none;
    }

    .model-action {
      font-size: clamp(10.5px, .68vw, 12.5px) !important;
      line-height: 1.1 !important;
      min-height: 27px !important;
      padding: 4px 9px !important;
      border-radius: 999px !important;
    }

    .model-actions,
    .camera-pan-panel {
      gap: 5px !important;
    }

    @media (max-width: 640px) {
      .model-action {
        font-size: 10.5px !important;
        min-height: 26px !important;
        padding: 4px 8px !important;
      }
    }

  

    /* Round 15: sky-like background and scale floor for the 3D viewer. */
    :root {
      --viewer-accent-rgb: 245, 205, 118;
      --viewer-sky-top: rgba(17, 24, 31, 1);
      --viewer-sky-mid: rgba(36, 41, 43, 1);
      --viewer-ground: rgba(21, 18, 14, 1);
    }

    body.viewer-tatlin { --viewer-accent-rgb: 229, 112, 86; }
    body.viewer-hall { --viewer-accent-rgb: 137, 169, 194; }
    body.viewer-soviets { --viewer-accent-rgb: 206, 118, 82; }

    .model-frame-page {
      position: relative !important;
      isolation: isolate !important;
      overflow: hidden !important;
      background:
        linear-gradient(180deg,
          rgba(12, 18, 24, 1) 0%,
          rgba(24, 30, 35, 1) 34%,
          rgba(37, 36, 32, 1) 56%,
          rgba(15, 13, 11, 1) 100%) !important;
    }

    .model-frame-page::before {
      content: "" !important;
      position: absolute !important;
      inset: 0 !important;
      z-index: 0 !important;
      pointer-events: none !important;
      background:
        radial-gradient(circle at 68% 22%, rgba(255, 226, 157, .26), transparent 16%),
        radial-gradient(circle at 50% 46%, rgba(var(--viewer-accent-rgb), .12), transparent 38%),
        linear-gradient(180deg, rgba(118, 147, 166, .2), transparent 44%),
        linear-gradient(180deg, rgba(255,255,255,.06), transparent 28%);
      opacity: .95;
    }

    .model-frame-page::after {
      content: "" !important;
      position: absolute !important;
      left: -18% !important;
      right: -18% !important;
      bottom: -18% !important;
      height: 54% !important;
      z-index: 0 !important;
      pointer-events: none !important;
      background:
        linear-gradient(rgba(255,255,255,.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.13) 1px, transparent 1px),
        radial-gradient(ellipse at center, rgba(var(--viewer-accent-rgb), .20), transparent 56%);
      background-size: 72px 72px, 72px 72px, 100% 100%;
      transform: perspective(620px) rotateX(64deg);
      transform-origin: center bottom;
      opacity: .52;
      mask-image: linear-gradient(to top, rgba(0,0,0,.9) 0%, rgba(0,0,0,.55) 42%, transparent 86%);
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,.9) 0%, rgba(0,0,0,.55) 42%, transparent 86%);
    }

    .model-viewer {
      position: relative !important;
      z-index: 1 !important;
      background: transparent !important;
    }

    .model-loader,
    .model-error,
    .model-ui,
    .model-toolbar {
      z-index: 5 !important;
    }

    .model-ui__label,
    .model-action--back,
    .model-action--standalone {
      border-color: rgba(var(--viewer-accent-rgb), .5) !important;
    }

    .model-ui__label {
      color: rgba(var(--viewer-accent-rgb), .98) !important;
    }

  

    /* Round 16: the viewer background is a fixed atmospheric/scale backdrop, not a rotating 3D floor. */
    .model-frame-page::before {
      background:
        radial-gradient(circle at 67% 21%, rgba(255, 226, 157, .22), transparent 15%),
        radial-gradient(circle at 50% 45%, rgba(var(--viewer-accent-rgb), .10), transparent 38%),
        linear-gradient(180deg, rgba(115, 145, 168, .18), transparent 43%),
        linear-gradient(180deg, rgba(255,255,255,.052), transparent 30%) !important;
    }

    .model-frame-page::after {
      left: -10% !important;
      right: -10% !important;
      bottom: -14% !important;
      height: 46% !important;
      background:
        linear-gradient(rgba(255,255,255,.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.10) 1px, transparent 1px),
        linear-gradient(180deg, transparent 0%, rgba(var(--viewer-accent-rgb), .10) 58%, transparent 100%) !important;
      background-size: 80px 80px, 80px 80px, 100% 100% !important;
      opacity: .34 !important;
      transform: perspective(680px) rotateX(63deg) !important;
      transform-origin: center bottom !important;
      mask-image: linear-gradient(to top, rgba(0,0,0,.9) 0%, rgba(0,0,0,.58) 42%, transparent 84%) !important;
      -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,.9) 0%, rgba(0,0,0,.58) 42%, transparent 84%) !important;
    }


    /* Round 19: keep the fullscreen exit control visible on mobile standalone 3D pages. */
    html,
    body,
    .model-frame-page {
      width: 100% !important;
      max-width: 100vw !important;
      min-height: 100vh !important;
      min-height: 100dvh !important;
      overflow: hidden !important;
      box-sizing: border-box !important;
    }

    .model-toolbar {
      box-sizing: border-box !important;
      max-width: calc(100vw - 20px) !important;
      z-index: 10000 !important;
    }

    @media (max-width: 720px) {
      .model-toolbar {
        position: fixed !important;
        left: max(8px, env(safe-area-inset-left)) !important;
        right: max(8px, env(safe-area-inset-right)) !important;
        bottom: max(8px, env(safe-area-inset-bottom)) !important;
        width: auto !important;
        max-width: none !important;
        max-height: 42dvh !important;
        overflow: auto !important;
        -webkit-overflow-scrolling: touch !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        padding: 0 !important;
        pointer-events: auto !important;
      }

      .model-actions,
      .camera-pan-panel {
        width: 100% !important;
        display: flex !important;
        flex-wrap: wrap !important;
        align-items: center !important;
        justify-content: center !important;
      }

      #fullscreenButton {
        order: -3 !important;
      }

      .model-action--back {
        order: -2 !important;
      }

      #panButton {
        order: -1 !important;
      }

      .model-action {
        white-space: nowrap !important;
      }

      .model-frame-page.is-pseudo-fullscreen .model-toolbar,
      .model-frame-page:fullscreen .model-toolbar,
      .model-frame-page:-webkit-full-screen .model-toolbar {
        top: max(8px, env(safe-area-inset-top)) !important;
        bottom: auto !important;
      }

      .model-frame-page.is-pseudo-fullscreen .model-ui,
      .model-frame-page:fullscreen .model-ui,
      .model-frame-page:-webkit-full-screen .model-ui {
        top: calc(max(8px, env(safe-area-inset-top)) + 42px) !important;
      }
    }

</style>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body class="viewer-soviets">
  <main class="model-frame-page model-shell" id="viewerShell" aria-label="Объект 03 / Дворец Советов">
    <div class="model-loader" id="modelLoader">загрузка модели…</div>
    <div class="model-error model-error-overlay" id="modelError" hidden>
      Не удалось загрузить 3D-модель. Откройте файл модели напрямую или обновите страницу.
    </div>

    <model-viewer
      id="modelViewer"
      class="model-viewer"
      src="../assets/models/soviets/palace-of-soviets.glb?v=20260512-round15"
      alt="Интерактивная 3D-модель Дворца Советов"
      data-default-orbit="0deg 65deg 150%"
      data-default-fov="28deg"
      data-real-height="430"
      data-reference-height="430"
      data-frame-fill="0.66"
      data-target-x=""
      data-target-y=""
      data-target-z=""
      data-center-y-factor="0.00"
      data-top-factor="0.55"
      data-top-y=""
      camera-controls
      touch-action="pan-y"
      auto-rotate
      auto-rotate-delay="1200"
      rotation-per-second="18deg"
      shadow-intensity="0"
      shadow-softness="1"
      exposure="0.95"
      environment-image="neutral"
      camera-orbit="0deg 65deg 150%"
      camera-target="0m 0m 0m"
      min-camera-orbit="auto auto 8%"
      max-camera-orbit="auto auto 720%"
      field-of-view="28deg"
      min-field-of-view="7deg"
      max-field-of-view="28deg"
      interaction-prompt="auto"
      interaction-prompt-style="basic"
      bounds="tight"
      loading="eager"
      reveal="auto">
    </model-viewer>

    <div class="model-ui" aria-hidden="true">
      <div class="model-ui__label">3D-модель / Дворец Советов</div>
      <div class="model-ui__status" id="modelStatus">загрузка модели…</div>
    </div>

    <nav class="model-toolbar" aria-label="Управление 3D-моделью">
      <div class="model-actions">
        <a class="model-action model-action--standalone" href="soviets.html?standalone=1" target="_blank" rel="noopener">Открыть 3D отдельно</a>
        <a class="model-action model-action--back" href="../soviets.html" target="_top">К странице объекта</a>
        <button class="model-action" type="button" id="fullscreenButton">Во весь экран</button>
        <button class="model-action" type="button" id="panButton" aria-expanded="false" aria-controls="cameraPanPanel">Сдвиг камеры</button>
      </div>

      <div class="camera-pan-panel" id="cameraPanPanel" hidden>
        <button class="model-action" type="button" data-pan="left">←</button>
        <button class="model-action" type="button" data-pan="right">→</button>
        <button class="model-action" type="button" data-pan="up">↑</button>
        <button class="model-action" type="button" data-pan="down">↓</button>
        <button class="model-action" type="button" data-pan="center">Центр</button>
        <button class="model-action" type="button" data-pan="top">К верхушке</button>
      </div>
    </nav>
  </main>

  <script>
    (() => {
      const shell = document.getElementById('viewerShell');
      const viewer = document.getElementById('modelViewer');
      const loader = document.getElementById('modelLoader');
      const error = document.getElementById('modelError');
      const status = document.getElementById('modelStatus');
      const fullscreenButton = document.getElementById('fullscreenButton');
      const panButton = document.getElementById('panButton');
      const panPanel = document.getElementById('cameraPanPanel');
      const params = new URLSearchParams(window.location.search);

      const isTopLevel = (() => {
        try { return window.self === window.top; }
        catch (_error) { return false; }
      })();

      if (params.has('standalone') || isTopLevel) {
        document.body.classList.add('is-standalone');
      }

      const numericDataset = (name, fallback) => {
        const raw = viewer.dataset[name];
        if (raw === undefined || String(raw).trim() === '') return fallback;
        const value = Number(raw);
        return Number.isFinite(value) ? value : fallback;
      };

      const state = {
        center: {
          x: numericDataset('targetX', 0),
          y: numericDataset('targetY', 0),
          z: numericDataset('targetZ', 0),
        },
        dimensions: { x: 1, y: 1, z: 1 },
        target: {
          x: numericDataset('targetX', 0),
          y: numericDataset('targetY', 0),
          z: numericDataset('targetZ', 0),
        },
        topY: numericDataset('topY', NaN),
        topFactor: numericDataset('topFactor', 0.44),
        centerYFactor: numericDataset('centerYFactor', 0),
        ready: false,
        initial: null,
      };

      const setStatus = (text) => {
        if (status) status.textContent = text;
      };

      const getVector = (value, fallback) => {
        if (!value) return { ...fallback };
        return {
          x: Number(value.x ?? fallback.x),
          y: Number(value.y ?? fallback.y),
          z: Number(value.z ?? fallback.z),
        };
      };

      const syncParentFrame = () => {
        try {
          const frame = window.frameElement;
          if (!frame) return;
          frame.style.display = 'block';
          frame.style.width = '100%';
          frame.style.height = '100%';
          frame.style.minWidth = '0';
          frame.style.minHeight = '0';
          frame.style.border = '0';
          frame.style.overflow = 'hidden';
          const host = frame.closest('.model-host, .model-viewer-wrap, .page-shell');
          if (host) {
            host.style.overflow = 'hidden';
            host.style.minWidth = '0';
          }
        } catch (_error) {}
      };

      const applyTarget = () => {
        viewer.cameraTarget = `${state.target.x}m ${state.target.y}m ${state.target.z}m`;
      };

      const getOrbitAngles = () => {
        const orbit = viewer.dataset.defaultOrbit || viewer.getAttribute('camera-orbit') || '0deg 65deg auto';
        const parts = orbit.trim().split(/\s+/);
        return {
          theta: parts[0] || '0deg',
          phi: parts[1] || '65deg',
        };
      };

      const getDefaultFovNumber = () => {
        const raw = String(viewer.dataset.defaultFov || viewer.getAttribute('field-of-view') || '30deg');
        const value = Number(raw.replace('deg', ''));
        return Number.isFinite(value) ? value : 30;
      };

      const clampNumber = (value, min, max) => Math.min(max, Math.max(min, value));

      const calculateDefaultCameraOrbit = () => {
        const angles = getOrbitAngles();
        const fov = getDefaultFovNumber();
        const realHeight = numericDataset('realHeight', 400);
        const referenceHeight = numericDataset('referenceHeight', 430);
        const baseFill = numericDataset('frameFill', 0.66);
        const heightRatio = clampNumber(realHeight / Math.max(referenceHeight, 1), 0.5, 1.05);
        const visibleFill = clampNumber(baseFill * heightRatio, 0.48, 0.68);
        const height = Math.max(state.dimensions.y, 1);
        const width = Math.max(state.dimensions.x, state.dimensions.z, 1);
        const framingSize = Math.max(height, width * 0.62);
        const fovRad = (fov * Math.PI) / 180;
        const distance = framingSize / (2 * Math.tan(fovRad / 2) * visibleFill);
        const safeDistance = Number.isFinite(distance) ? Math.max(distance, framingSize * 0.9, 1) : 'auto';
        return `${angles.theta} ${angles.phi} ${typeof safeDistance === 'number' ? safeDistance.toFixed(3) + 'm' : safeDistance}`;
      };

      const rememberInitialCamera = () => {
        state.initial = {
          target: { ...state.center },
          orbit: calculateDefaultCameraOrbit(),
          fov: `${getDefaultFovNumber()}deg`,
        };
        const numericDistance = Number(String(state.initial.orbit).trim().split(/\s+/)[2]?.replace('m', ''));
        if (Number.isFinite(numericDistance)) {
          viewer.minCameraOrbit = `auto auto ${Math.max(numericDistance * 0.08, 0.25).toFixed(3)}m`;
          viewer.maxCameraOrbit = `auto auto ${(numericDistance * 5).toFixed(3)}m`;
          viewer.setAttribute('min-camera-orbit', `auto auto ${Math.max(numericDistance * 0.08, 0.25).toFixed(3)}m`);
          viewer.setAttribute('max-camera-orbit', `auto auto ${(numericDistance * 5).toFixed(3)}m`);
        }
        viewer.minFieldOfView = '7deg';
        viewer.setAttribute('min-field-of-view', '7deg');
      };

      const applyInitialCamera = () => {
        if (!state.initial) return false;
        state.target = { ...state.initial.target };
        applyTarget();
        viewer.cameraOrbit = state.initial.orbit;
        viewer.fieldOfView = state.initial.fov;
        return true;
      };


      const resetCamera = () => {
        if (!applyInitialCamera()) {
          state.target = { ...state.center };
          applyTarget();
          viewer.cameraOrbit = viewer.dataset.defaultOrbit || viewer.getAttribute('camera-orbit') || '0deg 65deg auto';
          viewer.fieldOfView = viewer.dataset.defaultFov || viewer.getAttribute('field-of-view') || '30deg';
        }
        setStatus('камера по центру');
      };

      const focusTop = () => {
        const height = Math.max(state.dimensions.y, 1);
        state.target = {
          x: state.center.x,
          y: Number.isFinite(state.topY) ? state.topY : state.center.y + height * state.topFactor,
          z: state.center.z,
        };
        applyTarget();
        setStatus('камера к верхушке');
      };

      const panCamera = (direction) => {
        if (!state.ready) return;
        const stepX = Math.max(state.dimensions.x, state.dimensions.z, 1) * 0.08;
        const stepY = Math.max(state.dimensions.y, 1) * 0.08;
        if (direction === 'left') state.target.x -= stepX;
        if (direction === 'right') state.target.x += stepX;
        if (direction === 'up') state.target.y += stepY;
        if (direction === 'down') state.target.y -= stepY;
        if (direction === 'center') return resetCamera();
        if (direction === 'top') return focusTop();
        applyTarget();
        setStatus('сдвиг камеры');
      };

      const enterPseudoFullscreen = () => {
        shell.classList.add('pseudo-fullscreen', 'is-pseudo-fullscreen');
        fullscreenButton.textContent = 'Выйти из экрана';
      };

      const exitPseudoFullscreen = () => {
        shell.classList.remove('pseudo-fullscreen', 'is-pseudo-fullscreen');
        fullscreenButton.textContent = 'Во весь экран';
      };

      fullscreenButton.addEventListener('click', async () => {
        try {
          if (document.fullscreenElement) {
            await document.exitFullscreen();
          } else if (shell.requestFullscreen) {
            await shell.requestFullscreen();
          } else if (shell.webkitRequestFullscreen) {
            shell.webkitRequestFullscreen();
          } else if (shell.classList.contains('is-pseudo-fullscreen')) {
            exitPseudoFullscreen();
          } else {
            enterPseudoFullscreen();
          }
        } catch (_error) {
          if (shell.classList.contains('is-pseudo-fullscreen')) exitPseudoFullscreen();
          else enterPseudoFullscreen();
        }
      });

      document.addEventListener('fullscreenchange', () => {
        const active = document.fullscreenElement === shell;
        shell.classList.toggle('is-pseudo-fullscreen', active);
        fullscreenButton.textContent = active ? 'Выйти из экрана' : 'Во весь экран';
      });

      panButton.addEventListener('click', () => {
        const isHidden = panPanel.hasAttribute('hidden');
        panPanel.toggleAttribute('hidden', !isHidden);
        panButton.classList.toggle('is-active', isHidden);
        panButton.setAttribute('aria-expanded', String(isHidden));
        shell.classList.toggle('is-pan-mode', isHidden);
        setStatus(isHidden ? 'режим сдвига камеры' : 'вращение · масштаб · обзор');
      });

      document.querySelector('.model-ui__label')?.addEventListener('click', () => {
        resetCamera();
      });

      panPanel.addEventListener('click', (event) => {
        const button = event.target.closest('[data-pan]');
        if (!button) return;
        panCamera(button.dataset.pan);
      });

      syncParentFrame();
      window.addEventListener('resize', syncParentFrame);

      viewer.addEventListener('load', () => {
        loader.hidden = true;
        error.hidden = true;
        setStatus('вращение · масштаб · обзор');
        const detectedCenter = getVector(viewer.getBoundingBoxCenter?.(), state.center);
        const detectedDimensions = getVector(viewer.getDimensions?.(), state.dimensions);
        const adjustedCenter = {
          ...detectedCenter,
          y: detectedCenter.y + Math.max(detectedDimensions.y, 1) * state.centerYFactor,
        };
        const hasExplicitTarget = ['targetX', 'targetY', 'targetZ'].some((name) => viewer.dataset[name] !== undefined && viewer.dataset[name] !== '');
        if (!hasExplicitTarget) {
          state.center = adjustedCenter;
          state.target = { ...adjustedCenter };
        }
        state.dimensions = detectedDimensions;
        state.ready = true;
        rememberInitialCamera();
        applyInitialCamera();
        syncParentFrame();
      });

      viewer.addEventListener('progress', (event) => {
        const progress = event.detail && Number.isFinite(event.detail.totalProgress)
          ? Math.round(event.detail.totalProgress * 100)
          : null;
        if (progress !== null && progress < 100) setStatus(`загрузка модели… ${progress}%`);
      });

      viewer.addEventListener('error', () => {
        loader.hidden = true;
        error.hidden = false;
        setStatus('ошибка загрузки');
      });
    })();
  </script>
</body>
</html>
