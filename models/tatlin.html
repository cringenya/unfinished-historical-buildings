<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Башня Татлина — 3D-реконструкция</title>
  <link rel="stylesheet" href="../assets/css/model-frame.css" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body class="tatlin-model-page">
  <main class="model-frame-page" aria-label="Объект 01 / Башня Татлина">
    <model-viewer
      id="tatlinViewer"
      class="model-viewer model-viewer--tatlin"
      src="../assets/models/tatlin/tatlin.glb?v=20260511-pan"
      alt="Интерактивная 3D-модель Башни Татлина"
      camera-controls
      auto-rotate
      auto-rotate-delay="1200"
      rotation-per-second="18deg"
      interaction-prompt="auto"
      interaction-prompt-style="basic"
      touch-action="pan-y"
      shadow-intensity="0.85"
      exposure="0.92"
      environment-image="neutral"
      camera-orbit="35deg 70deg auto"
      min-camera-orbit="auto auto 35%"
      max-camera-orbit="auto auto 650%"
      field-of-view="32deg"
      bounds="tight"
      loading="eager"
      reveal="auto"
    >
      <div class="model-loader" slot="poster">3D-модель / Башня Татлина<br />загрузка модели…</div>
      <div class="model-error" slot="error">
        Не удалось загрузить 3D-модель. Откройте файл модели напрямую или обновите страницу.
      </div>
    </model-viewer>

    <div class="camera-pan-controls" id="panControls" aria-label="Сдвиг камеры">
      <button class="model-action camera-pan-toggle" id="panModeToggle" type="button" aria-pressed="false">Сдвиг камеры</button>
      <div class="camera-pan-panel" id="panPanel" hidden>
        <button class="model-action" type="button" data-pan="up">↑</button>
        <button class="model-action" type="button" data-pan="left">←</button>
        <button class="model-action" type="button" data-pan="center">Центр</button>
        <button class="model-action" type="button" data-pan="right">→</button>
        <button class="model-action" type="button" data-pan="down">↓</button>
        <button class="model-action model-action--wide" type="button" data-pan="top">К верхушке</button>
      </div>
    </div>

    <div class="model-actions" aria-label="Управление 3D-моделью">
      <a class="model-action model-action--standalone" href="tatlin.html" target="_top" rel="noopener">Открыть 3D отдельно</a>
      <a class="model-action" href="../tatlin.html" target="_top" rel="noopener">К странице объекта</a>
      <a class="model-action" href="../assets/models/tatlin/tatlin.glb?v=20260511-pan" target="_blank" rel="noopener">Файл модели</a>
      <button id="fullscreenToggle" class="model-action fullscreen-toggle" type="button">Во весь экран</button>
    </div>

    <div class="model-ui" aria-hidden="true">
      <span class="model-ui__label">3D-модель / Башня Татлина</span>
      <span id="modelStatus" class="model-ui__status">загрузка модели…</span>
    </div>
  </main>

  <script>
    const page = document.querySelector('.model-frame-page');
    const viewer = document.getElementById('tatlinViewer');
    const status = document.getElementById('modelStatus');
    const fullscreenToggle = document.getElementById('fullscreenToggle');
    const panModeToggle = document.getElementById('panModeToggle');
    const panPanel = document.getElementById('panPanel');

    document.body.classList.toggle('is-standalone', window.self === window.top);

    const cameraState = {
      target: { x: 0, y: 0, z: 0 },
      dimensions: { x: 1, y: 1, z: 1 },
      panMode: false,
      pointer: null
    };

    function expandParentModelWindow() {
      try {
        const frame = window.frameElement;
        if (!frame) return;

        const isMobile = window.matchMedia('(pointer: coarse), (max-width: 760px)').matches;
        const height = isMobile ? '78svh' : 'min(76vh, 760px)';
        const minHeight = isMobile ? '560px' : '540px';

        frame.style.width = '100%';
        frame.style.height = height;
        frame.style.minHeight = minHeight;
        frame.style.display = 'block';
        frame.style.border = '0';

        const host = frame.closest('.model-host, .sketchfab-wrap, .page-shell');
        if (host) {
          host.style.minHeight = minHeight;
          host.style.height = height;
          host.style.overflow = 'hidden';
        }

        const shell = frame.closest('.page-shell');
        if (shell) shell.style.width = '100%';
      } catch (_error) {}
    }

    function setCameraTarget(x, y, z) {
      cameraState.target = { x, y, z };
      viewer.cameraTarget = `${x}m ${y}m ${z}m`;
    }

    function getStep() {
      const d = cameraState.dimensions;
      return Math.max(d.x || 1, d.y || 1, d.z || 1) * 0.08;
    }

    function applyPan(action) {
      const t = cameraState.target;
      const step = getStep();
      const d = cameraState.dimensions;

      if (action === 'left') setCameraTarget(t.x - step, t.y, t.z);
      if (action === 'right') setCameraTarget(t.x + step, t.y, t.z);
      if (action === 'up') setCameraTarget(t.x, t.y + step, t.z);
      if (action === 'down') setCameraTarget(t.x, t.y - step, t.z);
      if (action === 'center') setCameraTarget(0, 0, 0);
      if (action === 'top') setCameraTarget(0, Math.max(d.y * 0.38, step), 0);
    }

    function setPanMode(enabled) {
      cameraState.panMode = enabled;
      page.classList.toggle('is-pan-mode', enabled);
      panPanel.hidden = !enabled;
      panModeToggle.setAttribute('aria-pressed', String(enabled));
      panModeToggle.textContent = enabled ? 'Вращение' : 'Сдвиг камеры';
      if (enabled) {
        viewer.removeAttribute('camera-controls');
        viewer.removeAttribute('auto-rotate');
        status.textContent = 'режим сдвига: перетащите модель, затем приблизьте';
      } else {
        viewer.setAttribute('camera-controls', '');
        viewer.setAttribute('auto-rotate', '');
        cameraState.pointer = null;
        status.textContent = 'режим вращения и масштаба';
      }
    }

    expandParentModelWindow();
    window.addEventListener('resize', expandParentModelWindow);

    viewer.addEventListener('load', () => {
      const dimensions = viewer.getDimensions ? viewer.getDimensions() : null;
      if (dimensions) cameraState.dimensions = dimensions;
      setCameraTarget(0, 0, 0);
      status.textContent = 'модель загружена — вращайте или включите сдвиг камеры';
    });

    viewer.addEventListener('progress', (event) => {
      const progress = event.detail && Number.isFinite(event.detail.totalProgress)
        ? Math.round(event.detail.totalProgress * 100)
        : null;
      status.textContent = progress === null || progress >= 100
        ? 'подготовка модели…'
        : `загрузка модели… ${progress}%`;
    });

    viewer.addEventListener('error', () => {
      status.textContent = 'ошибка загрузки модели';
    });

    panModeToggle.addEventListener('click', () => setPanMode(!cameraState.panMode));

    panPanel.addEventListener('click', (event) => {
      const button = event.target.closest('[data-pan]');
      if (!button) return;
      applyPan(button.dataset.pan);
    });

    viewer.addEventListener('pointerdown', (event) => {
      if (!cameraState.panMode) return;
      cameraState.pointer = { x: event.clientX, y: event.clientY };
      viewer.setPointerCapture?.(event.pointerId);
      event.preventDefault();
    });

    viewer.addEventListener('pointermove', (event) => {
      if (!cameraState.panMode || !cameraState.pointer) return;
      const dx = event.clientX - cameraState.pointer.x;
      const dy = event.clientY - cameraState.pointer.y;
      cameraState.pointer = { x: event.clientX, y: event.clientY };
      const rect = viewer.getBoundingClientRect();
      const scale = Math.max(cameraState.dimensions.x, cameraState.dimensions.y, cameraState.dimensions.z, 1) / Math.max(rect.width, rect.height, 1);
      const t = cameraState.target;
      setCameraTarget(t.x - dx * scale, t.y + dy * scale, t.z);
      event.preventDefault();
    });

    viewer.addEventListener('pointerup', () => { cameraState.pointer = null; });
    viewer.addEventListener('pointercancel', () => { cameraState.pointer = null; });

    fullscreenToggle.addEventListener('click', async () => {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else if (page.requestFullscreen) {
          await page.requestFullscreen();
        } else {
          throw new Error('Fullscreen API is not available');
        }
      } catch (_error) {
        page.classList.toggle('is-pseudo-fullscreen');
      }
    });
  </script>
</body>
</html>
