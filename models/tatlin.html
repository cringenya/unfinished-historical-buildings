<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Башня Татлина — 3D-реконструкция</title>
  <link rel="stylesheet" href="../assets/css/model-frame.css" />
  <style>
    html, body, .model-frame-page, #viewer { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #050607; }
    .model-frame-page, #viewer { position: absolute; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  </style>
</head>
<body>
  <main id="viewerPage" class="model-frame-page local-viewer-page" aria-label="Объект 01 / Башня Татлина">
    <div id="viewer" class="model-viewer" aria-label="Интерактивная 3D-модель Башни Татлина"></div>

    <div class="model-actions" aria-label="Управление 3D-моделью">
      <a class="model-action model-action--standalone" href="tatlin.html" target="_top" rel="noopener">Открыть 3D отдельно</a>
      <a class="model-action" href="../tatlin.html" target="_top" rel="noopener">К странице</a>
      <button id="fullscreenToggle" class="model-action fullscreen-toggle" type="button" aria-label="Открыть 3D-модель на весь экран">Во весь экран</button>
    </div>

    <p class="mobile-help">Если на телефоне не получается вращать модель, нажмите «Открыть 3D отдельно».</p>

    <div class="model-ui" aria-hidden="true">
      <span class="model-ui__label">3D-модель / Башня Татлина</span>
      <span id="modelStatus" class="model-ui__status">загрузка модели…</span>
    </div>
  </main>

  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.164.1';
    import { OrbitControls } from 'https://esm.sh/three@0.164.1/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://esm.sh/three@0.164.1/examples/jsm/loaders/GLTFLoader.js';

    const MODEL_URL = '../assets/models/tatlin/tatlin.glb?v=4';
    const page = document.getElementById('viewerPage');
    const container = document.getElementById('viewer');
    const status = document.getElementById('modelStatus');
    const fullscreenToggle = document.getElementById('fullscreenToggle');

    const standalone = window.self === window.top;
    const coarsePointer = matchMedia('(pointer: coarse)').matches || innerWidth <= 760;
    document.body.classList.toggle('is-standalone', standalone);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050607);
    scene.fog = new THREE.Fog(0x050607, 12, 44);

    const camera = new THREE.PerspectiveCamera(36, 1, 0.01, 1000);
    camera.position.set(4.3, 2.8, 6.4);

    const renderer = new THREE.WebGLRenderer({
      antialias: !coarsePointer,
      alpha: false,
      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, coarsePointer ? 1.35 : 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.enablePan = false;
    controls.enableZoom = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.45;
    controls.target.set(0, 0.3, 0);
    controls.touches.ONE = THREE.TOUCH.ROTATE;
    controls.touches.TWO = THREE.TOUCH.DOLLY_ROTATE;

    renderer.domElement.addEventListener('pointerdown', () => {
      controls.autoRotate = false;
    }, { passive: true });

    scene.add(new THREE.HemisphereLight(0xfff3d4, 0x20232a, 3.2));

    const lights = [
      [0xffdf9d, 4.5, 5, 8, 6],
      [0x9abfff, 2.1, -5, 4, -5],
      [0xffffff, 2.4, 0, 3, 8],
      [0xffffff, 2.0, -2, 7, -8]
    ];
    for (const [color, intensity, x, y, z] of lights) {
      const light = new THREE.DirectionalLight(color, intensity);
      light.position.set(x, y, z);
      scene.add(light);
    }

    const loader = new GLTFLoader();
    loader.load(
      MODEL_URL,
      (gltf) => {
        const model = gltf.scene || gltf.scenes[0];
        if (!model) {
          status.textContent = 'файл загружен, но сцена не найдена';
          return;
        }

        const info = prepareModel(model);
        if (info.meshCount === 0 || info.vertexCount === 0) {
          status.textContent = 'файл загружен, но геометрия не найдена';
          return;
        }

        scene.add(model);
        fitCameraToObject(model);
        status.textContent = 'модель загружена — перетащите, чтобы вращать';
      },
      (event) => {
        if (event.lengthComputable && event.total > 0) {
          status.textContent = `загрузка модели… ${Math.round((event.loaded / event.total) * 100)}%`;
        }
      },
      (error) => {
        console.error('Tatlin GLB loading error:', error);
        status.textContent = 'не удалось загрузить модель';
      }
    );

    function prepareModel(model) {
      let meshCount = 0;
      let vertexCount = 0;
      model.updateWorldMatrix(true, true);

      const originalBox = new THREE.Box3().setFromObject(model);
      const originalSize = originalBox.getSize(new THREE.Vector3());
      const originalCenter = originalBox.getCenter(new THREE.Vector3());
      const maxOriginalDim = Math.max(originalSize.x, originalSize.y, originalSize.z);
      const scale = maxOriginalDim > 0 ? 3.9 / maxOriginalDim : 1;

      model.scale.setScalar(scale);
      model.position.set(
        -originalCenter.x * scale,
        -originalCenter.y * scale,
        -originalCenter.z * scale
      );
      model.updateWorldMatrix(true, true);

      const centeredBox = new THREE.Box3().setFromObject(model);
      model.position.y += -1.42 - centeredBox.min.y;
      model.updateWorldMatrix(true, true);

      const edgeMaterial = new THREE.LineBasicMaterial({
        color: 0xe5c26f,
        transparent: true,
        opacity: 0.14,
        depthWrite: false
      });

      model.traverse((child) => {
        if (!child.isMesh) return;
        meshCount += 1;
        vertexCount += child.geometry?.attributes?.position?.count || 0;
        child.frustumCulled = false;

        const materials = Array.isArray(child.material) ? child.material : [child.material];
        for (const material of materials) {
          if (!material) continue;
          material.side = THREE.DoubleSide;
          material.depthTest = true;
          material.depthWrite = true;
          if (material.map) {
            material.map.colorSpace = THREE.SRGBColorSpace;
            material.map.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
          }
          if (material.name && /glass|window/i.test(material.name)) {
            material.transparent = true;
            material.opacity = 0.82;
            material.depthWrite = false;
          }
        }

        if (child.geometry) {
          const edges = new THREE.EdgesGeometry(child.geometry, 32);
          const line = new THREE.LineSegments(edges, edgeMaterial);
          line.renderOrder = 2;
          child.add(line);
        }
      });

      return { meshCount, vertexCount };
    }

    function fitCameraToObject(object) {
      object.updateWorldMatrix(true, true);
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const distance = maxDim / (2 * Math.tan((camera.fov * Math.PI) / 360));

      const direction = new THREE.Vector3(0.64, 0.42, 0.76).normalize();
      camera.position.copy(center).add(direction.multiplyScalar(distance * 1.34));
      camera.near = Math.max(0.01, distance / 100);
      camera.far = Math.max(100, distance * 100);
      camera.updateProjectionMatrix();
      controls.target.copy(center);
      controls.maxDistance = distance * 4;
      controls.minDistance = distance * 0.18;
      controls.update();
    }

    function resize() {
      const rect = container.getBoundingClientRect();
      const width = Math.max(1, rect.width);
      const height = Math.max(1, rect.height);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
    }

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize, { passive: true });
    window.addEventListener('orientationchange', () => setTimeout(resize, 250), { passive: true });
    resize();
    animate();

    fullscreenToggle.addEventListener('click', async () => {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else if (page.requestFullscreen) {
          await page.requestFullscreen();
        } else {
          throw new Error('Fullscreen API is not available');
        }
      } catch (_error) {
        page.classList.toggle('is-pseudo-fullscreen');
      } finally {
        setTimeout(resize, 120);
      }
    });
  </script>
</body>
</html>
